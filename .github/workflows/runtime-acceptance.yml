name: Nightly Runtime Acceptance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"

concurrency:
  group: runtime-acceptance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-runtime-acceptance:
    name: Build and validate Docker runtime
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t finance-superbrain-runtime .

      - name: Boot Docker compose stack
        run: docker compose up --build -d

      - name: Wait for API readiness
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3001/health >/dev/null && curl -fsS http://127.0.0.1:3001/ready >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "API did not become healthy in time." >&2
          docker compose ps
          exit 1

      - name: Verify worker-service liveness
        run: docker compose exec -T worker-service node apps/api/dist/scripts/checkOperationWorkerService.js --mode=liveness --service-id=worker-service-main

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down compose stack
        if: always()
        run: docker compose down -v
