name: Validate Monorepo

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, test, and verify worker drain path
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint web workspace
        run: npm run lint

      - name: Build monorepo
        run: npm run build

      - name: Run monorepo tests
        run: npm test

      - name: Verify operation worker drain path
        run: npm run ops:drain-operation-jobs

      - name: Run browser smoke coverage
        run: npm run test:e2e:smoke
