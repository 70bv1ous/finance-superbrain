name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Validate public pilot baseline
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate monorepo
        run: npm run verify

      - name: Deployment handoff note
        run: |
          echo "Repository validation passed."
          echo "Railway deploys this repository through its GitHub integration."
          echo "Use npm run demo:public-pilot:smoke after Railway reports the API deployment healthy."
