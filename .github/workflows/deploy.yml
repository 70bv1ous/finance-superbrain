name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Validate and trigger Railway redeploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate monorepo
        run: npm run verify

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Upload current commit to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --ci \
            --project a22e5528-10f6-456c-adad-87aa01ac78b9 \
            --environment production \
            --service sincere-smile \
            --message "github:${{ github.sha }}"
